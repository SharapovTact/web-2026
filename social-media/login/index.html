<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Login</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="./style.css">
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="page">
            <h1 class="page__title text">Войти</h1>
            <img class="page__main-image" src="../images/man-is-smiling.png" alt="Man is smiling" width="462" height="501">
            <form class="page__authorization">
                <div class="authorization__email">
                    <p class="email__description text">Электропочта</p>
                    <input class="email__input" type="email" id="user-email" name="user-email">
                    <p class="email__input-tip text">Введите электропочту в формате *****@***.**</p>
                </div>
                <div class="authorization__password">
                    <p class="password__description text">Пароль</p> 
                    <input class="password__input" type="password" id="user-password" name="user-password">
                    <img class="password__eye-off-image" src="../images/eye-off.png" alt="Eye off" width="24" height="24">
                </div>
                <a class="authorization__continue-button text" href="../home" title="Click to redirect to home">Продолжить</a>
            </form>
        </div>
    </body>
</html>
