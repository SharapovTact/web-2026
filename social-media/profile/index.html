<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Profile</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="./style.css">
        <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="page">
            <nav class="page__side-bar">
                <img class="side-bar__home-image side-bar__image" src="../images/home.png" alt="Home" width="40" height="40">
                <img class="side-bar__people-image side-bar__image" src="../images/people.png" alt="People" width="40" height="40">
                <img class="side-bar__plus-image side-bar__image" src="../images/plus.png" alt="Plus" width="40" height="40">
            </nav>
            <div class="page__profile">
                <div class="profile__head">
                    <img class="head__avatar" src="../images/ivan-avatar.png" alt="Avatar" width="123" height="123">
                    <h1 class="head__name text">Ваня Денисов</h1>
                    <p class="head__description text">Привет! Я системный аналитик в ACME :) 
                        Тут моя жизнь только для самых классных!</p>
                    <img class="head__count-of-posts" src="../images/count-of-posts.png" alt="Count of posts" width="101" height="30">
                </div>
                <div class="profile__gallery">
                    <img class="gallery__photo" src="../images/guy-stay-on-crossroad.jpg" alt="Guy stay on crossroad" width="322" height="322">
                    <img class="gallery__photo" src="../images/cake.png" alt="Cake" width="322" height="322">
                    <img class="gallery__photo" src="../images/big-build.png" alt="Big build" width="322" height="322">
                    <img class="gallery__photo" src="../images/a-lot-of-people.png" alt="A lot of people" width="322" height="322">
                    <img class="gallery__photo" src="../images/coffee.png" alt="Coffee" width="322" height="322">
                    <img class="gallery__photo" src="../images/book.png" alt="Book" width="322" height="322">
                    <img class="gallery__photo" src="../images/suny-streed.jpg" alt="Suny street" width="322" height="322">
                    <img class="gallery__photo" src="../images/two-man.jpg" alt="Two man" width="322" height="322">
                    <img class="gallery__photo" src="../images/goods-in-shop.jpg" alt="Goods in shop" width="322" height="322">
                </div>
            </div>
        </div>
    </body>
</html>
