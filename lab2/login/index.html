<DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href=".\style.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap');
        </style>
    </head>
    <body>
        <div class="page">
            <h1 class="page__title">Войти</h1>
            <img class="page__main-image" src="./images/man-is-smiling.png" width="462" height="501" alt="Man is smiling">
            <div class="page__authorization">
                <p class="authorization__username-description">Электропочта</p>
                <input class="authorization__email-input" type="email" id="user-email" name="user-email">
                <p class="authorization__email-input-tip">Введите электропочту в формате *****@***.**</p>
                <p class="authorization__password-description">Пароль</p>
                <input class="authorization__password-input" type="password" id="user-password" name="user-password">
                <img class="authorization__eye-off-image" src="./images/eye-off.png" alt="Eye off">
                <a class="authorization__continue-button" href="#" target="_blank" title="continue-button__title">Продолжить</a>
            </div>
        </div>
    </body>
</html>
