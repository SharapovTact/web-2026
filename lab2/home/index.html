<DOCTYPE html>
<html>
    <head>
        <title>Home</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href=".\style.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap');
        </style>
    </head>
    <body>
        <div class="page">
            <div class="page__side-bar">
                <img class="side-bar__home-image" src="..\images\home.png" alt="Home">
                <img class="side-bar__people-image" src="..\images\people.png" alt="People">
                <img class="side-bar__plus-image" src="..\images\plus.png" alt="Plus">
            </div>
            <div class="page__feed">
                <div class="feed__post">
                    <div class="post__header">
                        <div class="header__user">
                            <img class="user__avatar" src="..\images\ivan-avatar.png">
                            <p class="user__name">Ваня Денисов</p>
                        </div>
                        <img class="header__edit-image" src=".\images\edit.png" alt="Edit">
                    </div>
                    <div class="post__content">
                        <div class="content__images">
                            <img class="images__guy-stay-on-crossroad" src="..\images\guy-stay-on-crossroad.jpg" alt="Guy stay on crossroad">
                            <img class="images__indicator" src=".\images\indicator.png" alt="Indicator">
                        </div>
                        <img class="content__reaction" src=".\images\reaction.png" alt="Reaction">
                        <p class="content__description-short">
                            Так красиво сегодня на улице! Настоящая зима)) Вспоминается Бродский: 
                            «Поздно ночью, в уснувшей долине, на самом дне, в городке, занесенном 
                            снегом по ручку двери...» 
                        </p>
                        <a class="content__show-more" title="Click to see more">ещё</a>
                        <p class="content__time-ago">2 часа назад</p>
                    </div>
                </div>
                <div class="feed__post">
                    <div class="post__header">
                        <div class="header__user">
                            <img class="user__avatar" src="..\images\liza-avatar.png">
                            <p class="user__name">Лиза Дёмина</p>
                        </div>
                    </div>
                    <div class="post__content">
                        <div class="content__images">
                            <img class="images__guy-stay-on-crossroad" src="..\images\flower-and-paper.png" alt="Flower and paper">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
