<DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href=".\style.css">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Golos+Text:wght@400..900&display=swap');
        </style>
    </head>
    <body>
        <div class="page">
            <div class="page__side-bar">
                <img class="side-bar__home-image" src=".\images\home.png" alt="Home">
                <img class="side-bar__people-image" src=".\images\people.png" alt="People">
                <img class="side-bar__plus-image" src=".\images\plus.png" alt="Plus">
            </div>
            <div class="page__feed">
                <div class="feed__post">
                    <div class="post__header">
                        <div class="header__user">
                            <img class="user__avatar" src=".\images\ivan.png">
                            <p class="user__name">Ваня Денисов</p>
                        </div>
                        <img class="header__edit-image" src=".\images\edit.png" alt="Edit">
                    </div>
                    <div class="post__content">
                        <div class="content__images">
                            <img class="images__guy-stay-on-crossroad" src=".\images\guy-stay-on-crossroad.jpg" alt="Guy stay on crossroad">
                            <img class="images__indicator" src=".\images\indicator.png" alt="Indicator">
                        </div>
                        <div class="post__reactions">
                            <a class="reactions__button">102</a>
                        </div>
                        <div class="content__description-short"></div>
                        <div class="content__description-all"></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
